<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Olga — скоро открытие</title>
<meta name="description" content="Сайт в разработке. Скоро здесь будет что-то интересное.">
<style>
  :root {
    --bg: #0f1115;
    --fg: #f2f3f5;
    --muted: #9aa1ad;
    --accent: #c9a227;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #faf9f7;
      --fg: #1a1c20;
      --muted: #6b7280;
      --accent: #a9861a;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  main { max-width: 560px; }
  .mark {
    width: 64px; height: 64px;
    margin: 0 auto 28px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 600; letter-spacing: 1px;
    color: var(--accent);
  }
  h1 {
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
  }
  p {
    color: var(--muted);
    font-size: clamp(15px, 2.4vw, 18px);
    line-height: 1.6;
    margin: 0 0 32px;
  }
  .divider {
    width: 48px; height: 2px;
    background: var(--accent);
    margin: 0 auto 32px;
    opacity: .7;
  }
  a {
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 2px;
  }
  a:hover { color: var(--accent); }
  footer {
    margin-top: 40px;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
<main>
  <div class="mark">O</div>
  <h1>Скоро открытие</h1>
  <div class="divider"></div>
  <p>Сайт находится в разработке. Загляните чуть позже — здесь появится всё самое интересное.</p>
  <p><a href="mailto:skrylkovs@gmail.com">Связаться</a></p>
  <footer>&copy; 2026</footer>
</main>
</body>
</html>
